# Purpose: Expose Red Team UI externally via NodePort
apiVersion: v1
kind: Service
metadata:
  name: red-team-service
  namespace: voting-system
  labels:
    app: votevibe-red
    tier: frontend
spec:
  type: NodePort
  selector:
    app: votevibe-red
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 5000
      nodePort: 30002            # Different port from Blue (30001)
  sessionAffinity: ClientIP
