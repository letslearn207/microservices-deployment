apiVersion: v1
kind: Service
metadata:
  name: results-service
  namespace: voting-system
  labels:
    app: results-dashboard
spec:
  type: NodePort
  selector:
    app: results-dashboard
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 5000
      nodePort: 30003            # Third external port for the scoreboard
