# Purpose: Store non-sensitive Blue Team configuration
apiVersion: v1
kind: ConfigMap
metadata:
  name: blue-team-config
  namespace: voting-system
  labels:
    app: votevibe-blue
    team: blue
data:
  # Team identity
  TEAM_COLOR: "blue"
  TEAM_NAME:  "Blue Team"
  # Visual theme
  BG_HEX:     "#1a237e"
  ACCENT_HEX: "#42a5f5"
  # App settings
  APP_PORT:   "5000"
  LOG_LEVEL:  "INFO"
