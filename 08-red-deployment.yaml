# Purpose: Deploy the Blue Team voting frontend with Redis integration
apiVersion: apps/v1
kind: Deployment
metadata:
  name: blue-team-deployment
  namespace: voting-system
  labels:
    app: votevibe-blue
    tier: frontend
    team: blue
    version: "1.0"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: votevibe-blue
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: votevibe-blue
        tier: frontend
        team: blue
    spec:
      containers:
      - name: votevibe-blue
        image: python:3.11-slim
        imagePullPolicy: IfNotPresent
        command: ["/bin/sh","-c"]
        args:
        - |
          pip install flask gunicorn redis --quiet &&
          cat > /app.py << 'PYEOF'
          import os
          import redis as redislib
          from flask import Flask, render_template_string, redirect

          app = Flask(__name__)

          TEAM_NAME  = os.environ.get("TEAM_NAME","Blue Team")
          BG_COLOR   = os.environ.get("BG_HEX","#1a237e")
          ACCENT     = os.environ.get("ACCENT_HEX","#42a5f5")

          REDIS_HOST = os.environ.get("REDIS_HOST","redis-service")
          REDIS_PORT = int(os.environ.get("REDIS_PORT","6379"))
          REDIS_PASS = os.environ.get("REDIS_PASSWORD")
          VOTE_KEY   = os.environ.get("VOTE_KEY","blue_votes")

          try:
              r = redislib.Redis(
                  host=REDIS_HOST,
                  port=REDIS_PORT,
                  password=REDIS_PASS,
                  decode_responses=True,
                  socket_connect_timeout=3
              )
              r.ping()
              REDIS_OK=True
          except Exception as e:
              print("Redis connection failed:", e)
              REDIS_OK=False
              r=None

          TEMPLATE = '''
          <!DOCTYPE html>
          <html>
          <head>
          <title>VoteVibe - Blue</title>
          <style>
          *{margin:0;padding:0;box-sizing:border-box}
          body{background:{{bg}};font-family:Arial;display:flex;justify-content:center;align-items:center;height:100vh;color:white}
          .card{background:rgba(255,255,255,.1);padding:40px;border-radius:20px;border:2px solid {{ac}};text-align:center}
          .count{font-size:64px;color:{{ac}};margin:20px}
          button{padding:15px 35px;font-size:20px;border:none;border-radius:30px;background:{{ac}};cursor:pointer}
          </style>
          </head>
          <body>
          <div class="card">
            <h1>🔵 {{nm}}</h1>
            <div class="count">{{vc}}</div>
            <form method="POST" action="/vote">
              <button>CAST VOTE</button>
            </form>
            <p>Redis: {{ "Connected" if redis_ok else "Disconnected" }}</p>
            <p>Pod: {{pod}}</p>
          </div>
          </body>
          </html>
          '''

          @app.route("/")
          def index():
              votes = 0
              if REDIS_OK:
                  try:
                      votes = int(r.get(VOTE_KEY) or 0)
                  except:
                      pass
              return render_template_string(
                  TEMPLATE,
                  nm=TEAM_NAME,
                  bg=BG_COLOR,
                  ac=ACCENT,
                  vc=votes,
                  redis_ok=REDIS_OK,
                  pod=os.environ.get("HOSTNAME","?")
              )

          @app.route("/vote", methods=["POST"])
          def vote():
              if REDIS_OK:
                  try:
                      r.incr(VOTE_KEY)
                  except Exception as e:
                      print(e)
              return redirect("/")

          @app.route("/healthz")
          def health():
              return {"status":"ok","redis":REDIS_OK},200

          if __name__=="__main__":
              app.run(host="0.0.0.0", port=5000)
          PYEOF
          gunicorn --bind 0.0.0.0:5000 --workers 2 app:app
        ports:
        - containerPort: 5000
          name: http
        envFrom:
        - configMapRef:
            name: blue-team-config
        env:
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: REDIS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: redis-secret
              key: redis-password
              optional: true
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "300m"
        livenessProbe:
          httpGet:
            path: /healthz
            port: 5000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /healthz
            port: 5000
          initialDelaySeconds: 15
          periodSeconds: 5
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - votevibe-blue
              topologyKey: kubernetes.io/hostname
